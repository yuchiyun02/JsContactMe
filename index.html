<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Js Contact Me</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="js/app.js"></script>
</head>
<body>
    <div class="container">
        <div class="app-header">
            <div class="app-header-main">
                <img src="assets/images/logo.png" alt="JsContactMe logo" class="app-logo">
                <div class="app-title">
                    <span class="app-badge">Interview Assessment - Cheong Eu Joon</span>
                    <h1>JsContactMe</h1>
                    <p>"Just Contact Me" - A simple contact manager built in JavaScript</p>
                </div>
            </div>
            <div class="persistence-control" id="persistenceControl">
                <span class="persistence-label" id="persistenceLabel">Memory Only</span>
                <span class="persistence-tooltip" id="persistenceDescription" role="tooltip">Contacts stay in memory only and reset on refresh.</span>
                <label class="toggle-switch" for="persistenceToggle">
                    <input type="checkbox" id="persistenceToggle">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>

        <div class="toolbar">
            <div class="search">
                <input type="text" id="search" placeholder="Search by name">
            </div>
            <button id="openModalBtn">Add Contact</button>
        </div>

        <div class="table-card">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="contactList"></tbody>
            </table>
        </div>
    </div>

    <div class="modal hidden" id="contactModal">
        <div class="modal-backdrop" id="modalBackdrop"></div>
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <h2 id="modalTitle">Add Contact</h2>
            <div class="form">
                <input type="text" id="name" placeholder="Name">
                <input type="text" id="phone" placeholder="Phone">
                <input type="email" id="email" placeholder="Email">
            </div>
            <div class="modal-actions">
                <button id="closeModalBtn" class="secondary-btn">Cancel</button>
                <button id="addBtn">Save Contact</button>
            </div>
        </div>
    </div>
</body>
</html>
