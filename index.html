<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Js Contact Me</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="js/app.js"></script>
</head>
<body>
    <div class="container">
        <h1>JsContactMe</h1>
        <p>"Just Contact Me" - A simple contact manager built in JavaScript</p>

        <div class="toolbar">
            <button id="openModalBtn">Add Contact</button>
        </div>

        <!-- Search -->
        <div class="search">
            <input type="text" id="search" placeholder="Search by name">
        </div>

        <!-- Contact List -->
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="contactList"></tbody>
        </table>
    </div>

    <div class="modal hidden" id="contactModal">
        <div class="modal-backdrop" id="modalBackdrop"></div>
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <h2 id="modalTitle">Add Contact</h2>
            <div class="form">
                <input type="text" id="name" placeholder="Name">
                <input type="text" id="phone" placeholder="Phone">
                <input type="email" id="email" placeholder="Email">
            </div>
            <div class="modal-actions">
                <button id="closeModalBtn" class="cancel-btn">Cancel</button>
                <button id="addBtn">Save Contact</button>
            </div>
        </div>
    </div>
</body>
</html>
