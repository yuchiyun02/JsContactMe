<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Js Contact Me</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="js/app.js"></script>
</head>
<body>
    <div class="container">
        <h1>JsContactMe</h1>
        <p>"Just Contact Me" - A simple contact manager built in JavaScript</p>

        <!-- Add Contact -->
        <div class="form">
            <input type="text" id="name" placeholder="Name">
            <input type="text" id="phone" placeholder="Phone">
            <input type="email" id="email" placeholder="Email">
            <button id="addBtn">Add Contact</button>
        </div>

        <!-- Search -->
        <div class="search">
            <input type="text" id="search" placeholder="Search by name">
        </div>

        <!-- Contact List -->
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="contactList"></tbody>
        </table>
    </div>
</body>
</html>
